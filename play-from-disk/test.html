<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pion play-from-disk Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }

        h1 {
            color: #00d4ff;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .panel {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #0f3460;
        }

        .panel h2 {
            color: #e94560;
            margin-top: 0;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            background: #0f3460;
            color: #00ff88;
            border: 1px solid #533483;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
            box-sizing: border-box;
        }

        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: background 0.2s;
        }

        button:hover {
            background: #ff6b6b;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        video,
        audio {
            width: 100%;
            max-width: 640px;
            border-radius: 4px;
            background: #000;
        }

        audio {
            margin-top: 10px;
        }

        .audio-viz-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            padding: 15px;
            background: #0f3460;
            border-radius: 8px;
            min-height: 60px;
        }

        .audio-bubble {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #4caf50;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s ease-out, box-shadow 0.05s ease-out;
            box-shadow: 0 0 0px rgba(76, 175, 80, 0);
        }

        .audio-bubble svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        .audio-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 50px;
        }

        .audio-bar {
            width: 6px;
            background: linear-gradient(to top, #00ff88, #00d4ff);
            border-radius: 3px;
            transition: height 0.05s ease-out;
            min-height: 3px;
        }

        .audio-label {
            color: #888;
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
        }

        #status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-family: monospace;
            min-height: 20px;
        }

        .status-connecting {
            background: #ff9800;
            color: #000;
        }

        .status-connected {
            background: #4caf50;
            color: #fff;
        }

        .status-failed {
            background: #f44336;
            color: #fff;
        }

        .status-new {
            background: #2196f3;
            color: #fff;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
            font-size: 12px;
        }

        .stat-box {
            background: #0f3460;
            padding: 8px;
            border-radius: 4px;
        }

        .stat-label {
            color: #888;
        }

        .stat-value {
            color: #00ff88;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Pion play-from-disk Test Observer</h1>
    <div id="status" class="status-new">Status: Ready - Click "Create Offer" to start</div>

    <div class="container">
        <div class="panel">
            <h2>Step 1: Create & Send Offer</h2>
            <button id="btnCreateOffer">Create Offer</button>
            <button id="btnCopyOffer" disabled>Copy Offer</button>
            <textarea id="offerSdp" placeholder="Offer SDP will appear here..." readonly></textarea>
        </div>

        <div class="panel">
            <h2>Step 2: Paste Answer</h2>
            <button id="btnPasteAnswer" disabled>Process Answer</button>
            <textarea id="answerSdp" placeholder="Paste answer SDP from Go program here..."></textarea>
        </div>

        <div class="panel" style="grid-column: 1 / -1;">
            <h2>Step 3: Observe Stream</h2>
            <video id="remoteVideo" autoplay playsinline></video>
            <audio id="remoteAudio" autoplay></audio>
            <div class="audio-viz-container" id="audioViz" style="display: none;">
                <div class="audio-bubble" id="audioBubble">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3.01 2.6 5.39 5.41 6.11v2.1c0 .55.45 1 1 1s1-.45 1-1v-2.1c2.81-.72 4.92-3.1 5.41-6.11.09-.6-.39-1.14-1-1.14z" />
                    </svg>
                </div>
                <div class="audio-bars" id="audioBars"></div>
            </div>
            <div class="audio-label" id="audioLabel" style="display: none;">Receiving Audio</div>
            <div class="stats" id="stats"></div>
        </div>
    </div>

    <script>
        let pc = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let animationId = null;
        let barElements = [];
        const statusEl = document.getElementById('status');
        const offerSdpEl = document.getElementById('offerSdp');
        const answerSdpEl = document.getElementById('answerSdp');
        const btnCreateOffer = document.getElementById('btnCreateOffer');
        const btnCopyOffer = document.getElementById('btnCopyOffer');
        const btnPasteAnswer = document.getElementById('btnPasteAnswer');
        const remoteVideo = document.getElementById('remoteVideo');
        const remoteAudio = document.getElementById('remoteAudio');
        const statsEl = document.getElementById('stats');
        const audioViz = document.getElementById('audioViz');
        const audioBubble = document.getElementById('audioBubble');
        const audioBars = document.getElementById('audioBars');
        const audioLabel = document.getElementById('audioLabel');

        function setStatus(msg, cls) {
            statusEl.textContent = 'Status: ' + msg;
            statusEl.className = cls;
        }

        function updateStats() {
            if (!pc || pc.connectionState !== 'connected') return;
            pc.getStats().then(stats => {
                let html = '';
                stats.forEach(report => {
                    if (report.type === 'inbound-rtp') {
                        if (report.mediaType === 'video') {
                            html += '<div class="stat-box"><div class="stat-label">Video Packets</div><div class="stat-value">' + (report.packetsReceived || 0) + '</div></div>';
                            html += '<div class="stat-box"><div class="stat-label">Frames Decoded</div><div class="stat-value">' + (report.framesDecoded || 0) + '</div></div>';
                        } else if (report.mediaType === 'audio') {
                            html += '<div class="stat-box"><div class="stat-label">Audio Packets</div><div class="stat-value">' + (report.packetsReceived || 0) + '</div></div>';
                            html += '<div class="stat-box"><div class="stat-label">Audio Bytes</div><div class="stat-value">' + (report.bytesReceived || 0) + '</div></div>';
                        }
                    }
                });
                statsEl.innerHTML = html;
            });
        }

        setInterval(updateStats, 1000);

        // Move audio visualizer functions outside to avoid recreation
        function createBars(count) {
            audioBars.innerHTML = '';
            barElements = [];
            for (let i = 0; i < count; i++) {
                const bar = document.createElement('div');
                bar.className = 'audio-bar';
                bar.style.height = '3px';
                audioBars.appendChild(bar);
                barElements.push(bar);
            }
        }

        function startAudioVisualizer(stream) {
            if (audioContext) {
                audioContext.close();
            }
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 64;
            analyser.smoothingTimeConstant = 0.7;
            source.connect(analyser);

            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            createBars(bufferLength);

            audioViz.style.display = 'flex';
            audioLabel.style.display = 'block';

            function draw() {
                if (!analyser) return;
                animationId = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                let sum = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const value = dataArray[i];
                    sum += value;
                    const percent = value / 255;
                    const height = Math.max(3, percent * 50);
                    barElements[i].style.height = height + 'px';
                }

                const average = sum / bufferLength;
                const bubbleScale = 1 + (average / 255) * 0.6;
                const glow = (average / 255) * 25;
                audioBubble.style.transform = 'scale(' + bubbleScale + ')';
                audioBubble.style.boxShadow = '0 0 ' + glow + 'px rgba(76, 175, 80, 0.6)';

                if (average < 2) {
                    audioBubble.style.background = '#555';
                } else {
                    audioBubble.style.background = '#4caf50';
                }
            }
            draw();
        }

        function stopAudioVisualizer() {
            if (animationId) cancelAnimationFrame(animationId);
            if (audioContext) audioContext.close();
            analyser = null;
            audioViz.style.display = 'none';
            audioLabel.style.display = 'none';
        }

        function setButtonsState(createDisabled, copyDisabled, pasteDisabled) {
            btnCreateOffer.disabled = createDisabled;
            btnCopyOffer.disabled = copyDisabled;
            btnPasteAnswer.disabled = pasteDisabled;
        }

        btnCreateOffer.addEventListener('click', async () => {
            // Disable buttons during offer creation
            setButtonsState(true, true, true);
            setStatus('Creating offer...', 'status-connecting');

            try {
                pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });

                pc.oniceconnectionstatechange = () => {
                    setStatus('ICE: ' + pc.iceConnectionState, 'status-connecting');
                };

                pc.onconnectionstatechange = () => {
                    if (pc.connectionState === 'connected') {
                        setStatus('Connected! Receiving stream.', 'status-connected');
                        setButtonsState(true, false, false);
                    } else if (pc.connectionState === 'failed') {
                        setStatus('Connection failed', 'status-failed');
                        setButtonsState(false, true, true);
                    }
                };

                pc.ontrack = (event) => {
                    if (event.track.kind === 'video') {
                        remoteVideo.srcObject = event.streams[0];
                    } else if (event.track.kind === 'audio') {
                        remoteAudio.srcObject = event.streams[0];
                        // Explicit play() to satisfy autoplay policy after user interaction
                        remoteAudio.play().catch(e => console.log('Audio play deferred:', e));

                        if (event.streams[0]) {
                            startAudioVisualizer(event.streams[0]);
                        }
                    }
                };

                // Add transceivers for video and audio
                pc.addTransceiver('video', { direction: 'recvonly' });
                pc.addTransceiver('audio', { direction: 'recvonly' });

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                // Wait for ICE gathering
                await new Promise(resolve => {
                    if (pc.iceGatheringState === 'complete') {
                        resolve();
                    } else {
                        pc.addEventListener('icegatheringstatechange', () => {
                            if (pc.iceGatheringState === 'complete') resolve();
                        });
                    }
                });

                offerSdpEl.value = btoa(JSON.stringify(pc.localDescription));
                setButtonsState(true, false, false);
                setStatus('Offer created. Copy and paste into Go program.', 'status-connecting');
            } catch (error) {
                setStatus('Error creating offer: ' + error.message, 'status-failed');
                setButtonsState(false, true, true);
            }
        });

        btnCopyOffer.addEventListener('click', () => {
            offerSdpEl.select();
            document.execCommand('copy');
            setStatus('Offer copied to clipboard!', 'status-new');
        });

        btnPasteAnswer.addEventListener('click', async () => {
            setButtonsState(true, true, true);
            setStatus('Processing answer...', 'status-connecting');

            try {
                const answer = JSON.parse(atob(answerSdpEl.value.trim()));
                await pc.setRemoteDescription(answer);
                setStatus('Answer set. Connecting...', 'status-connecting');
            } catch (e) {
                setStatus('Error parsing answer: ' + e.message, 'status-failed');
                setButtonsState(true, false, false);
            }
        });
    </script>
</body>

</html>
